<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .bg { fill: #fbf7ef; }
      .title { font: 700 34px Georgia, "Times New Roman", serif; fill: #21170d; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #7d6a56; }
      .group-title { font: 700 14px Arial, sans-serif; fill: #8b6535; letter-spacing: 1.4px; }
      .table { fill: #fffdf8; stroke: #d8c3a3; stroke-width: 1.4; rx: 16; filter: drop-shadow(0 10px 18px rgba(77,49,20,.08)); }
      .table-main { fill: #fffaf0; stroke: #a77a3b; stroke-width: 2; rx: 18; }
      .head { fill: #8a6230; rx: 14; }
      .head-text { font: 700 15px Arial, sans-serif; fill: #fffaf0; letter-spacing: .7px; }
      .field { font: 13px Arial, sans-serif; fill: #34261a; }
      .muted { fill: #7f7368; }
      .pk { font-weight: 700; fill: #6c481d; }
      .fk { fill: #956d37; }
      .link { fill: none; stroke: #9b7444; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .link-soft { fill: none; stroke: #c2a77d; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowSoft); }
      .legend-box { fill: #fffdf8; stroke: #d8c3a3; stroke-width: 1.2; rx: 14; }
      .legend-text { font: 13px Arial, sans-serif; fill: #5d4d3f; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#9b7444" />
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#c2a77d" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1200" />
  <text class="title" x="70" y="70">Cityscape Hotel - Database Schema</text>
  <text class="subtitle" x="70" y="100">Entity relationship overview for the hotel booking platform</text>

  <rect class="legend-box" x="1360" y="42" width="365" height="84" />
  <text class="legend-text" x="1384" y="72">PK = Primary Key</text>
  <text class="legend-text" x="1384" y="96">FK = Foreign Key</text>
  <text class="legend-text" x="1514" y="72">1:N = one record links to many</text>
  <text class="legend-text" x="1514" y="96">M:N = junction table relationship</text>

  <text class="group-title" x="90" y="158">CLIENTS &amp; AUTH</text>
  <text class="group-title" x="474" y="158">HOTEL INVENTORY</text>
  <text class="group-title" x="920" y="158">BOOKING CORE</text>
  <text class="group-title" x="1320" y="158">FINANCE &amp; SERVICES</text>
  <text class="group-title" x="120" y="860">EXPERIENCE, STAYS &amp; REWARDS</text>

  <!-- Clients and Auth -->
  <g id="client_type">
    <rect class="table" x="70" y="180" width="250" height="118" />
    <rect class="head" x="70" y="180" width="250" height="36" />
    <text class="head-text" x="92" y="203">CLIENT_TYPES</text>
    <text class="field pk" x="92" y="240">PK tip</text>
    <text class="field" x="92" y="263">discount</text>
    <text class="field" x="92" y="286">benefits</text>
  </g>

  <g id="client">
    <rect class="table-main" x="70" y="340" width="270" height="190" />
    <rect class="head" x="70" y="340" width="270" height="36" />
    <text class="head-text" x="92" y="363">CLIENTS</text>
    <text class="field pk" x="92" y="400">PK ClientId</text>
    <text class="field" x="92" y="423">FirstName, LastName</text>
    <text class="field" x="92" y="446">Email unique</text>
    <text class="field" x="92" y="469">Password</text>
    <text class="field fk" x="92" y="492">FK TypeClientTip</text>
    <text class="field" x="92" y="515">profilePicture</text>
  </g>

  <g id="admin">
    <rect class="table" x="70" y="585" width="250" height="118" />
    <rect class="head" x="70" y="585" width="250" height="36" />
    <text class="head-text" x="92" y="608">ADMINS</text>
    <text class="field pk" x="92" y="645">PK AdminId</text>
    <text class="field" x="92" y="668">email unique</text>
    <text class="field" x="92" y="691">password, name</text>
  </g>

  <g id="reset">
    <rect class="table" x="360" y="585" width="260" height="140" />
    <rect class="head" x="360" y="585" width="260" height="36" />
    <text class="head-text" x="382" y="608">PASSWORD_RESET_TOKENS</text>
    <text class="field pk" x="382" y="645">PK PasswordResetTokenId</text>
    <text class="field fk" x="382" y="668">FK ClientId</text>
    <text class="field" x="382" y="691">tokenHash unique</text>
    <text class="field" x="382" y="714">expiresAt, usedAt</text>
  </g>

  <!-- Hotel Inventory -->
  <g id="hotel">
    <rect class="table" x="440" y="180" width="250" height="118" />
    <rect class="head" x="440" y="180" width="250" height="36" />
    <text class="head-text" x="462" y="203">HOTELS</text>
    <text class="field pk" x="462" y="240">PK HotelId</text>
    <text class="field" x="462" y="263">name</text>
    <text class="field" x="462" y="286">address</text>
  </g>

  <g id="theme">
    <rect class="table-main" x="440" y="340" width="300" height="236" />
    <rect class="head" x="440" y="340" width="300" height="36" />
    <text class="head-text" x="462" y="363">ROOM_THEMES</text>
    <text class="field pk" x="462" y="400">PK RoomThemeId</text>
    <text class="field" x="462" y="423">city, continent</text>
    <text class="field" x="462" y="446">theme, name</text>
    <text class="field" x="462" y="469">description</text>
    <text class="field" x="462" y="492">basePrice</text>
    <text class="field" x="462" y="515">amenities JSON</text>
    <text class="field" x="462" y="538">maxGuests, size, bedType</text>
    <text class="field" x="462" y="561">showcaseImage</text>
  </g>

  <g id="room">
    <rect class="table-main" x="775" y="330" width="260" height="164" />
    <rect class="head" x="775" y="330" width="260" height="36" />
    <text class="head-text" x="797" y="353">ROOMS</text>
    <text class="field pk" x="797" y="390">PK RoomId</text>
    <text class="field" x="797" y="413">floor</text>
    <text class="field" x="797" y="436">status</text>
    <text class="field fk" x="797" y="459">FK HotelId</text>
    <text class="field fk" x="797" y="482">FK RoomThemeId</text>
  </g>

  <g id="room_image">
    <rect class="table" x="775" y="535" width="260" height="140" />
    <rect class="head" x="775" y="535" width="260" height="36" />
    <text class="head-text" x="797" y="558">ROOM_IMAGES</text>
    <text class="field pk" x="797" y="595">PK RoomImageId</text>
    <text class="field fk" x="797" y="618">FK RoomThemeId</text>
    <text class="field" x="797" y="641">imageUrl</text>
    <text class="field" x="797" y="664">isPrimary, orderIndex</text>
  </g>

  <g id="staff">
    <rect class="table" x="775" y="180" width="240" height="118" />
    <rect class="head" x="775" y="180" width="240" height="36" />
    <text class="head-text" x="797" y="203">STAFF</text>
    <text class="field pk" x="797" y="240">PK id</text>
    <text class="field" x="797" y="263">firstName, lastName, role</text>
    <text class="field fk" x="797" y="286">FK HotelId</text>
  </g>

  <!-- Booking Core -->
  <g id="reservation">
    <rect class="table-main" x="1080" y="245" width="300" height="220" />
    <rect class="head" x="1080" y="245" width="300" height="36" />
    <text class="head-text" x="1102" y="268">RESERVATIONS</text>
    <text class="field pk" x="1102" y="305">PK ReservationId</text>
    <text class="field" x="1102" y="328">reservationDate</text>
    <text class="field" x="1102" y="351">requestedCheckin</text>
    <text class="field" x="1102" y="374">requestedCheckout</text>
    <text class="field" x="1102" y="397">bookingMethod, nrPeople</text>
    <text class="field fk" x="1102" y="420">FK ClientId</text>
    <text class="field" x="1102" y="443">status</text>
  </g>

  <g id="room_reservation">
    <rect class="table" x="1080" y="520" width="300" height="110" />
    <rect class="head" x="1080" y="520" width="300" height="36" />
    <text class="head-text" x="1102" y="543">ROOM_RESERVATIONS</text>
    <text class="field pk" x="1102" y="580">PK/FK ReservationId</text>
    <text class="field pk" x="1102" y="603">PK/FK RoomId</text>
  </g>

  <!-- Finance and Services -->
  <g id="invoice">
    <rect class="table-main" x="1430" y="210" width="280" height="164" />
    <rect class="head" x="1430" y="210" width="280" height="36" />
    <text class="head-text" x="1452" y="233">INVOICES</text>
    <text class="field pk" x="1452" y="270">PK InvoiceId</text>
    <text class="field" x="1452" y="293">issueDate</text>
    <text class="field" x="1452" y="316">totalAmount, status</text>
    <text class="field fk" x="1452" y="339">FK ReservationId</text>
  </g>

  <g id="payment">
    <rect class="table-main" x="1430" y="410" width="280" height="140" />
    <rect class="head" x="1430" y="410" width="280" height="36" />
    <text class="head-text" x="1452" y="433">PAYMENTS</text>
    <text class="field pk" x="1452" y="470">PK id</text>
    <text class="field" x="1452" y="493">amount, paymentDate</text>
    <text class="field fk" x="1452" y="516">FK InvoiceId</text>
    <text class="field" x="1452" y="539">paymentType</text>
  </g>

  <g id="service">
    <rect class="table-main" x="1430" y="605" width="300" height="210" />
    <rect class="head" x="1430" y="605" width="300" height="36" />
    <text class="head-text" x="1452" y="628">SERVICES</text>
    <text class="field pk" x="1452" y="665">PK ServiceId</text>
    <text class="field" x="1452" y="688">name, category</text>
    <text class="field" x="1452" y="711">description</text>
    <text class="field" x="1452" y="734">price, priceType</text>
    <text class="field" x="1452" y="757">status</text>
    <text class="field" x="1452" y="780">bookableOnline</text>
    <text class="field" x="1452" y="803">image</text>
  </g>

  <g id="reservation_service">
    <rect class="table" x="1080" y="675" width="300" height="150" />
    <rect class="head" x="1080" y="675" width="300" height="36" />
    <text class="head-text" x="1102" y="698">RESERVATION_SERVICES</text>
    <text class="field pk" x="1102" y="735">PK/FK ReservationId</text>
    <text class="field pk" x="1102" y="758">PK/FK ServiceId</text>
    <text class="field" x="1102" y="781">quantity, unitPrice</text>
    <text class="field" x="1102" y="804">personDetails JSON</text>
  </g>

  <g id="consumed_service">
    <rect class="table" x="1430" y="860" width="300" height="150" />
    <rect class="head" x="1430" y="860" width="300" height="36" />
    <text class="head-text" x="1452" y="883">CONSUMED_SERVICES</text>
    <text class="field pk" x="1452" y="920">PK/FK InvoiceId</text>
    <text class="field pk" x="1452" y="943">PK/FK ServiceId</text>
    <text class="field" x="1452" y="966">quantity, paidPrice</text>
    <text class="field" x="1452" y="989">personDetails JSON</text>
  </g>

  <!-- Experience, Stays and Rewards -->
  <g id="feedback">
    <rect class="table" x="100" y="900" width="285" height="175" />
    <rect class="head" x="100" y="900" width="285" height="36" />
    <text class="head-text" x="122" y="923">FEEDBACK</text>
    <text class="field pk" x="122" y="960">PK id</text>
    <text class="field" x="122" y="983">overall, cleanliness</text>
    <text class="field" x="122" y="1006">service, theme</text>
    <text class="field" x="122" y="1029">comment, submissionDate</text>
    <text class="field fk" x="122" y="1052">FK ClientId, ReservationId</text>
  </g>

  <g id="stay">
    <rect class="table" x="430" y="900" width="285" height="152" />
    <rect class="head" x="430" y="900" width="285" height="36" />
    <text class="head-text" x="452" y="923">STAYS</text>
    <text class="field pk" x="452" y="960">PK StayId</text>
    <text class="field" x="452" y="983">actualCheckin</text>
    <text class="field" x="452" y="1006">actualCheckout</text>
    <text class="field fk" x="452" y="1029">FK ClientId, ReservationId, RoomId</text>
  </g>

  <g id="reward">
    <rect class="table" x="760" y="900" width="285" height="175" />
    <rect class="head" x="760" y="900" width="285" height="36" />
    <text class="head-text" x="782" y="923">REWARDS</text>
    <text class="field pk" x="782" y="960">PK RewardId</text>
    <text class="field" x="782" y="983">title, desc</text>
    <text class="field" x="782" y="1006">points, image</text>
    <text class="field" x="782" y="1029">category, active</text>
    <text class="field" x="782" y="1052">rewardType</text>
  </g>

  <g id="reward_point">
    <rect class="table" x="1090" y="900" width="300" height="175" />
    <rect class="head" x="1090" y="900" width="300" height="36" />
    <text class="head-text" x="1112" y="923">REWARD_POINTS</text>
    <text class="field pk" x="1112" y="960">PK RewardPointId</text>
    <text class="field fk" x="1112" y="983">FK UserId</text>
    <text class="field fk" x="1112" y="1006">FK ReservationId</text>
    <text class="field" x="1112" y="1029">amount, status</text>
    <text class="field" x="1112" y="1052">description, availableAt</text>
  </g>

  <!-- Relationship lines -->
  <path class="link" d="M195 298 L195 340" />
  <path class="link-soft" d="M340 435 C600 435 830 360 1080 355" />
  <path class="link-soft" d="M340 485 C400 560 425 585 490 585" />
  <path class="link-soft" d="M340 510 C470 810 155 805 210 900" />
  <path class="link-soft" d="M340 510 C620 790 540 820 572 900" />
  <path class="link-soft" d="M340 495 C770 840 1088 815 1225 900" />

  <path class="link" d="M690 239 L775 239" />
  <path class="link" d="M690 250 C735 300 760 340 775 390" />
  <path class="link" d="M740 430 L775 420" />
  <path class="link" d="M740 530 C760 560 770 595 775 615" />

  <path class="link" d="M1035 412 L1080 395" />
  <path class="link" d="M1230 465 L1230 520" />
  <path class="link" d="M1035 455 C1065 505 1075 545 1080 575" />
  <path class="link" d="M1380 355 L1430 292" />
  <path class="link" d="M1570 374 L1570 410" />
  <path class="link-soft" d="M1230 465 C1220 570 1220 640 1230 675" />
  <path class="link-soft" d="M1380 750 L1430 710" />
  <path class="link-soft" d="M1580 815 L1580 860" />
  <path class="link-soft" d="M1570 550 C1600 690 1600 780 1580 860" />

  <path class="link-soft" d="M1230 465 C1020 735 310 755 245 900" />
  <path class="link-soft" d="M1230 465 C1040 780 675 790 572 900" />
  <path class="link-soft" d="M905 494 C820 720 640 770 572 900" />
  <path class="link-soft" d="M1230 465 C1230 675 1235 800 1240 900" />

  <text class="subtitle" x="70" y="1148">Note: Payments.amount represents money actually collected. Invoices.totalAmount represents contractual invoice value.</text>
</svg>
